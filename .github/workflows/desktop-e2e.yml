name: Desktop E2E

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Fixture canonica para o smoke desktop"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - megadrive
          - snes
  workflow_call:
    inputs:
      target:
        description: "Fixture canonica para o smoke desktop"
        required: false
        default: "all"
        type: string
  push:
    paths:
      - ".github/workflows/desktop-e2e.yml"
      - "package.json"
      - "package-lock.json"
      - "scripts/build.mjs"
      - "scripts/e2e-tauri-build-run.mjs"
      - "src/**"
      - "src-tauri/**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/desktop-e2e.yml"
      - "package.json"
      - "package-lock.json"
      - "scripts/build.mjs"
      - "scripts/e2e-tauri-build-run.mjs"
      - "src/**"
      - "src-tauri/**"

permissions:
  contents: read

concurrency:
  group: desktop-e2e-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || github.event_name == 'workflow_call' && inputs.target || 'all' }}
  cancel-in-progress: true

jobs:
  desktop-smoke:
    runs-on: windows-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: pwsh
    env:
      CARGO_BUILD_JOBS: 2
      RUST_MIN_STACK: 16777216
      RDS_E2E_DRIVER_TIMEOUT_MS: 60000
      RDS_E2E_UI_TIMEOUT_MS: 30000
      RDS_E2E_RUN_TIMEOUT_MS: 300000
      RDS_FORCE_TAURI_CLI_DEBUG: "1"
      RDS_E2E_TARGET: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || github.event_name == 'workflow_call' && inputs.target || 'all' }}
      RDS_GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install Edge WebDriver helper
        run: cargo install --git https://github.com/chippers/msedgedriver-tool

      - name: Provision native Edge WebDriver
        run: |
          $driverDir = Join-Path $env:RUNNER_TEMP 'retrodev-e2e-driver'
          New-Item -ItemType Directory -Force -Path $driverDir | Out-Null
          Push-Location $driverDir
          & "$HOME/.cargo/bin/msedgedriver-tool.exe"
          Pop-Location
          $driverPath = Join-Path $driverDir 'msedgedriver.exe'
          if (!(Test-Path $driverPath)) {
            throw "msedgedriver.exe nao foi provisionado em $driverDir"
          }
          "RDS_EDGE_DRIVER_PATH=$driverPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build debug desktop app (canonical script)
        id: build_debug
        run: npm run build:debug

      - name: Report resolved target
        run: |
          Write-Host "Desktop E2E target: $env:RDS_E2E_TARGET"
          Write-Host "Desktop E2E driver startup timeout: $env:RDS_E2E_DRIVER_TIMEOUT_MS ms"
          Write-Host "Desktop E2E UI bootstrap timeout: $env:RDS_E2E_UI_TIMEOUT_MS ms"
          Write-Host "Desktop E2E timeout: $env:RDS_E2E_RUN_TIMEOUT_MS ms"

      - name: Initialize desktop E2E pass ledger
        run: |
          $ledgerPath = Join-Path $env:RUNNER_TEMP 'desktop-e2e-passed.txt'
          if (Test-Path $ledgerPath) {
            Remove-Item -Path $ledgerPath -Force
          }
          New-Item -ItemType File -Path $ledgerPath -Force | Out-Null
          "RDS_E2E_LEDGER=$ledgerPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8NoBOM -Append

      - name: Run Mega Drive desktop smoke
        id: smoke_md
        if: ${{ env.RDS_E2E_TARGET == 'all' || env.RDS_E2E_TARGET == 'megadrive' }}
        continue-on-error: true
        run: |
          npm run test:e2e:desktop:md -- --skip-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run SNES desktop smoke
        id: smoke_snes
        if: ${{ env.RDS_E2E_TARGET == 'all' || env.RDS_E2E_TARGET == 'snes' }}
        continue-on-error: true
        run: |
          npm run test:e2e:desktop:snes -- --skip-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }


      - name: Run Mega Drive live overflow desktop E2E
        id: live_overflow_md
        if: ${{ env.RDS_E2E_TARGET == 'all' || env.RDS_E2E_TARGET == 'megadrive' }}
        continue-on-error: true
        run: |
          npm run test:e2e:desktop:live-overflow:md -- --skip-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }


      - name: Run SNES live overflow desktop E2E
        id: live_overflow_snes
        if: ${{ env.RDS_E2E_TARGET == 'all' || env.RDS_E2E_TARGET == 'snes' }}
        continue-on-error: true
        run: |
          npm run test:e2e:desktop:live-overflow:snes -- --skip-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }


      - name: Run Mega Drive live VRAM overflow desktop E2E
        id: live_vram_overflow_md
        if: ${{ env.RDS_E2E_TARGET == 'all' || env.RDS_E2E_TARGET == 'megadrive' }}
        continue-on-error: true
        run: |
          npm run test:e2e:desktop:live-overflow-vram:md -- --skip-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }


      - name: Run SNES live VRAM overflow desktop E2E
        id: live_vram_overflow_snes
        if: ${{ env.RDS_E2E_TARGET == 'all' || env.RDS_E2E_TARGET == 'snes' }}
        continue-on-error: true
        run: |
          npm run test:e2e:desktop:live-overflow-vram:snes -- --skip-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }


      - name: Run Mega Drive live VRAM warning desktop E2E
        id: live_vram_warning_md
        if: ${{ env.RDS_E2E_TARGET == 'all' || env.RDS_E2E_TARGET == 'megadrive' }}
        continue-on-error: true
        run: |
          npm run test:e2e:desktop:live-warning-vram:md -- --skip-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }


      - name: Run SNES live VRAM warning desktop E2E
        id: live_vram_warning_snes
        if: ${{ env.RDS_E2E_TARGET == 'all' || env.RDS_E2E_TARGET == 'snes' }}
        continue-on-error: true
        run: |
          npm run test:e2e:desktop:live-warning-vram:snes -- --skip-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }


      - name: Run Mega Drive live sprite warning desktop E2E
        id: live_sprite_warning_md
        if: ${{ env.RDS_E2E_TARGET == 'all' || env.RDS_E2E_TARGET == 'megadrive' }}
        continue-on-error: true
        run: |
          npm run test:e2e:desktop:live-warning-sprites:md -- --skip-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }


      - name: Run SNES live sprite warning desktop E2E
        id: live_sprite_warning_snes
        if: ${{ env.RDS_E2E_TARGET == 'all' || env.RDS_E2E_TARGET == 'snes' }}
        continue-on-error: true
        run: |
          npm run test:e2e:desktop:live-warning-sprites:snes -- --skip-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }


      - name: Run Mega Drive live healthy desktop E2E
        id: live_ok_md
        if: ${{ env.RDS_E2E_TARGET == 'all' || env.RDS_E2E_TARGET == 'megadrive' }}
        continue-on-error: true
        run: |
          npm run test:e2e:desktop:live-ok:md -- --skip-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }


      - name: Run SNES live healthy desktop E2E
        id: live_ok_snes
        if: ${{ env.RDS_E2E_TARGET == 'all' || env.RDS_E2E_TARGET == 'snes' }}
        continue-on-error: true
        run: |
          npm run test:e2e:desktop:live-ok:snes -- --skip-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }


      - name: Run Mega Drive live error desktop E2E
        id: live_error_md
        if: ${{ env.RDS_E2E_TARGET == 'all' || env.RDS_E2E_TARGET == 'megadrive' }}
        continue-on-error: true
        run: |
          npm run test:e2e:desktop:live-error:md -- --skip-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }


      - name: Run SNES live error desktop E2E
        id: live_error_snes
        if: ${{ env.RDS_E2E_TARGET == 'all' || env.RDS_E2E_TARGET == 'snes' }}
        continue-on-error: true
        run: |
          npm run test:e2e:desktop:live-error:snes -- --skip-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }


      - name: Run Mega Drive live stale desktop E2E
        id: live_stale_md
        if: ${{ env.RDS_E2E_TARGET == 'all' || env.RDS_E2E_TARGET == 'megadrive' }}
        continue-on-error: true
        run: |
          npm run test:e2e:desktop:live-stale:md -- --skip-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }


      - name: Run SNES live stale desktop E2E
        id: live_stale_snes
        if: ${{ env.RDS_E2E_TARGET == 'all' || env.RDS_E2E_TARGET == 'snes' }}
        continue-on-error: true
        run: |
          npm run test:e2e:desktop:live-stale:snes -- --skip-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }


      - name: Report step outcomes before verification
        if: always()
        shell: pwsh
        run: |
          Write-Host "Step outcomes (outcome / conclusion):"
          Write-Host "  smoke_md:              ${{ steps.smoke_md.outcome }}"
          Write-Host "  smoke_snes:            ${{ steps.smoke_snes.outcome }}"
          Write-Host "  live_overflow_md:      ${{ steps.live_overflow_md.outcome }}"
          Write-Host "  live_overflow_snes:    ${{ steps.live_overflow_snes.outcome }}"
          Write-Host "  live_vram_overflow_md: ${{ steps.live_vram_overflow_md.outcome }}"
          Write-Host "  live_vram_overflow_snes: ${{ steps.live_vram_overflow_snes.outcome }}"
          Write-Host "  live_vram_warning_md:  ${{ steps.live_vram_warning_md.outcome }}"
          Write-Host "  live_vram_warning_snes: ${{ steps.live_vram_warning_snes.outcome }}"
          Write-Host "  live_sprite_warning_md: ${{ steps.live_sprite_warning_md.outcome }}"
          Write-Host "  live_sprite_warning_snes: ${{ steps.live_sprite_warning_snes.outcome }}"
          Write-Host "  live_ok_md:            ${{ steps.live_ok_md.outcome }}"
          Write-Host "  live_ok_snes:          ${{ steps.live_ok_snes.outcome }}"
          Write-Host "  live_error_md:         ${{ steps.live_error_md.outcome }}"
          Write-Host "  live_error_snes:       ${{ steps.live_error_snes.outcome }}"
          Write-Host "  live_stale_md:         ${{ steps.live_stale_md.outcome }}"
          Write-Host "  live_stale_snes:       ${{ steps.live_stale_snes.outcome }}"

      - name: Verify all E2E scenarios passed
        if: always()
        shell: pwsh
        run: |
          $ledgerPath = if ($env:RDS_E2E_LEDGER) {
            $env:RDS_E2E_LEDGER
          } else {
            Join-Path $env:RUNNER_TEMP 'desktop-e2e-passed.txt'
          }

          if (-not (Test-Path $ledgerPath)) {
            throw "Ledger de cenarios E2E nao encontrado em $ledgerPath"
          }

          Write-Host "--- Ledger diagnostics ---"
          Write-Host "Ledger path: $ledgerPath"
          $rawBytes = [System.IO.File]::ReadAllBytes($ledgerPath)
          Write-Host "Ledger size: $($rawBytes.Length) bytes"
          if ($rawBytes.Length -gt 0) {
            Write-Host "First 10 bytes: $($rawBytes[0..[Math]::Min(9,$rawBytes.Length-1)] -join ',')"
          }
          $rawText = [System.IO.File]::ReadAllText($ledgerPath)
          if ($rawText.Length -gt 0 -and [int][char]$rawText[0] -eq 0xfeff) {
            $rawText = $rawText.Substring(1)
          }
          Write-Host "Raw content:`n$rawText"
          Write-Host "--- End diagnostics ---"

          $expectedMd = @(
            'smoke_md',
            'live_overflow_md',
            'live_vram_overflow_md',
            'live_vram_warning_md',
            'live_sprite_warning_md',
            'live_ok_md',
            'live_error_md',
            'live_stale_md'
          )
          $expectedSnes = @(
            'smoke_snes',
            'live_overflow_snes',
            'live_vram_overflow_snes',
            'live_vram_warning_snes',
            'live_sprite_warning_snes',
            'live_ok_snes',
            'live_error_snes',
            'live_stale_snes'
          )

          $expected = switch ($env:RDS_E2E_TARGET) {
            'megadrive' { $expectedMd }
            'snes' { $expectedSnes }
            default { @($expectedMd + $expectedSnes) }
          }
          $executed = @(
            $rawText -split "`r?`n" | ForEach-Object { $_.Trim() } | Where-Object {
              -not [string]::IsNullOrWhiteSpace($_)
            }
          )

          Write-Host "Expected ($($expected.Count)): $($expected -join ', ')"
          Write-Host "Executed ($(@($executed).Count)): $(@($executed) -join ', ')"

          $missing = @($expected | Where-Object { $_ -notin $executed })

          if ($missing.Count -gt 0) {
            Write-Host "::error::E2E scenarios missing success markers ($($missing.Count)): $($missing -join ', ')"
            exit 1
          }

          Write-Host "All $($expected.Count) E2E scenarios passed."

      - name: Publish desktop E2E summary
        if: always()
        shell: pwsh
        run: |
          $lines = @(
            "# Desktop E2E Summary",
            "",
            "- Target: $env:RDS_E2E_TARGET",
            "- Build debug: ${{ steps.build_debug.outcome }}",
            "- Smoke Mega Drive: ${{ steps.smoke_md.outcome }}",
            "- Smoke SNES: ${{ steps.smoke_snes.outcome }}",
            "- Live overflow MD: ${{ steps.live_overflow_md.outcome }}",
            "- Live overflow SNES: ${{ steps.live_overflow_snes.outcome }}",
            "- Live VRAM overflow MD: ${{ steps.live_vram_overflow_md.outcome }}",
            "- Live VRAM overflow SNES: ${{ steps.live_vram_overflow_snes.outcome }}",
            "- Live VRAM warning MD: ${{ steps.live_vram_warning_md.outcome }}",
            "- Live VRAM warning SNES: ${{ steps.live_vram_warning_snes.outcome }}",
            "- Live sprite warning MD: ${{ steps.live_sprite_warning_md.outcome }}",
            "- Live sprite warning SNES: ${{ steps.live_sprite_warning_snes.outcome }}",
            "- Live ok MD: ${{ steps.live_ok_md.outcome }}",
            "- Live ok SNES: ${{ steps.live_ok_snes.outcome }}",
            "- Live error MD: ${{ steps.live_error_md.outcome }}",
            "- Live error SNES: ${{ steps.live_error_snes.outcome }}",
            "- Live stale MD: ${{ steps.live_stale_md.outcome }}",
            "- Live stale SNES: ${{ steps.live_stale_snes.outcome }}",
            "- Overall job: ${{ job.status }}",
            ""
          )

          $validationDir = Join-Path $PWD 'src-tauri\target-test\validation'
          if (Test-Path $validationDir) {
            $lines += "## Validation artifacts"
            Get-ChildItem $validationDir -File | Sort-Object Name | ForEach-Object {
              $lines += "- $($_.Name)"
            }
            $lines += ""
          }

          $lines | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload desktop validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-e2e-validation-${{ github.run_id }}-${{ env.RDS_E2E_TARGET }}
          path: |
            src-tauri/target-test/validation/**
          if-no-files-found: ignore
