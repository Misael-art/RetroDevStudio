name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    env:
      CARGO_BUILD_JOBS: 2
      RUST_MIN_STACK: 16777216
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Structure check
        run: npm run check:tree

      - name: Frontend lint
        run: npm run lint

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      # cargo test --lib isolado com --test-threads=1 para evitar conflitos de I/O
      # e lockfile em hosts Windows com AppLocker/antivirus ativo.
      # Para suites pesadas multithreaded, use o workflow desktop-e2e.yml num runner dedicado.
      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --lib -- --nocapture --test-threads=1
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/src-tauri/target

      - name: Frontend tests
        run: npm test

      - name: TypeScript check
        run: npx tsc --noEmit
